services:
  # Type of service to deploy
  type: web
  
  # Name of your service
  name: ai-career-copilot
  
  # Runtime environment
  runtime: node
  
  # Build configuration
  buildCommand: cd server && npm install && cd ../client && npm install && cd ../server && npm run build
  
  # Start command
  startCommand: cd server && npm start
  
  # Environment variables
  envVars:
    # MongoDB connection
    - key: MONGODB_URI
      value: mongodb://mongo:mongodb@mongo:27017/ai_career_copilot
    # Server configuration
    - key: PORT
      value: 10000
    - key: NODE_ENV
      value: production
    - key: CLIENT_URL
      value: https://ai-career-copilot.onrender.com
    # JWT secrets (set these in Render dashboard)
    - key: JWT_ACCESS_SECRET
      sync: false
    - key: JWT_REFRESH_SECRET
      sync: false
    # Email configuration (set these in Render dashboard)
    - key: EMAIL_USER
      sync: false
    - key: EMAIL_PASS
      sync: false
    # Gemini API key (set this in Render dashboard)
    - key: GEMINI_API_KEY
      sync: false

# Health check path
healthCheckPath: /api/health

# Auto-deploy configuration
autoDeploy: true

# Plan type
plan: free
