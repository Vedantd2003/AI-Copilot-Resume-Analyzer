version: '3.9'

services:
  mongodb:
    image: mongo:7.0
    container_name: ai_copilot_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
      MONGO_INITDB_DATABASE: ai_career_copilot
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - copilot_network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ai_copilot_server
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      - MONGODB_URI=mongodb://admin:adminpassword@mongodb:27017/ai_career_copilot?authSource=admin
    ports:
      - '5000:5000'
    depends_on:
      - mongodb
    volumes:
      - ./server:/app
      - /app/node_modules
      - uploads_data:/app/uploads
    networks:
      - copilot_network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: ai_copilot_client
    restart: unless-stopped
    env_file:
      - ./client/.env
    ports:
      - '5173:5173'
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - copilot_network

volumes:
  mongo_data:
  uploads_data:

networks:
  copilot_network:
    driver: bridge
